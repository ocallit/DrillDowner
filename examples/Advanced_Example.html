<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DrillDowner - Advanced Example</title>
  <link href="../src/drilldowner.css" rel="stylesheet" type="text/css"/>

</head>
<body style="margin:0 auto;padding:0 1em">
<div style="margin:0;padding:0;display:flex;justify-content: space-between;align-items: start;flex-wrap: wrap">
  <a href="https://ocallit.github.io/DrillDowner/" aria-label="Home">🏠</a>
  <div style="margin:0;padding:0">
    <h1 style="margin:0;padding:0">DrillDowner.js</h1>
    <p style="font-size:0.9em;color:gray;margin:0;padding:0.2em">Interactive drill-down widget</p>
  </div>
  <a href="https://github.com/ocallit/DrillDowner" aria-label="GitHub Repository">
    <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
  </a>
</div>
<h2>Advanced Example (Running Balance + Click Context + Leaf Renderer)</h2>
<div id="advanced-controls"></div>
<div style="display:flex; gap:16px;">
  <div id="advanced-az"></div>
  <div id="advanced-table" style="flex:1;"></div>
</div>
<pre id="advanced-log" style="background:#f7f7f7; padding:10px; margin-top:10px;">Click any label to inspect context.</pre>

<script>
  const tx = [
    { account: "Operating", month: "2024-01", category: "Income", desc: "Invoice 1001", credit: 5200, debit: 0 },
    { account: "Operating", month: "2024-01", category: "Expense", desc: "Cloud Hosting", credit: 0, debit: 480 },
    { account: "Operating", month: "2024-02", category: "Income", desc: "Invoice 1008", credit: 4100, debit: 0 },
    { account: "Savings", month: "2024-02", category: "Income", desc: "Interest", credit: 90, debit: 0 },
    { account: "Savings", month: "2024-02", category: "Expense", desc: "Bank Fee", credit: 0, debit: 12 }
  ];

  new DrillDowner('#advanced-table', tx, {
    groupOrder: ["account", "month", "category"],
    availableDimensions: ["account", "month", "category"],
    groupOrderCombinations: [
      ["account", "month", "category"],
      ["category", "account", "month"]
    ],
    totals: ["credit", "debit", "balance"],
    columns: ["desc"],
    ledger: [
      { label: "Ledger: by Month", cols: ["month", "account", "desc", "credit", "debit", "balance"], sort: ["-month"] }
    ],
    controlsSelector: '#advanced-controls',
    azBarSelector: '#advanced-az',
    colProperties: {
      account: { label: "Account", icon: "🏦" },
      month: { label: "Month", icon: "🗓️" },
      category: { label: "Category", icon: "📚" },
      desc: { label: "Description" },
      credit: { label: "Credit", formatter: (v) => v ? `+$${DrillDowner.formatNumber(v, 2)}` : '-' },
      debit: { label: "Debit", formatter: (v) => v ? `-$${DrillDowner.formatNumber(v, 2)}` : '-' },
      balance: {
        label: "Running Balance",
        balanceBehavior: { initialBalance: 10000, add: ["credit"], subtract: ["debit"] },
        formatter: (v) => `$${DrillDowner.formatNumber(v, 2)}`
      }
    },
    leafRenderer: (item) => `${item.category} <small style="color:#666">• ${item.desc}</small>`,
    onLabelClick: (ctx) => {
      document.getElementById('advanced-log').textContent = JSON.stringify({
        label: ctx.label,
        level: ctx.level,
        path: ctx.hierarchyMap
      }, null, 2);
    }
  });
</script>
</body>
</html>
