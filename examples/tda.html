<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>P&L DrillDowner</title>
    <link rel="stylesheet" href="../src/drilldowner.css">
    <script src="../src/DrillDowner.js"></script>
    <style> body { font-family: Arial, sans-serif; padding: 20px; } </style>
</head>
<body style="margin:0 auto;padding:0 1em">
<div style="margin:0;padding:0;display:flex;justify-content: space-between;align-items: start;flex-wrap: wrap">
    <a href="https://ocallit.github.io/DrillDowner/" aria-label="Home">🏠</a>
    <div style="margin:0;padding:0">
        <h1 style="margin:0;padding:0">DrillDowner.js</h1>
        <p style="font-size:0.9em;color:gray;margin:0;padding:0.2em">Interactive drill-down widget</p>
    </div>
    <a href="https://github.com/ocallit/DrillDowner" aria-label="GitHub Repository">
        <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
    </a>
</div>

    <h1>Reporte P&L</h1>
    
    <div id="pnl-controls"></div>
    <div id="pnl-table"></div>

    <script>
        // Your raw SQL UNION data goes here. No JS pre-processing needed!
        const sqlData = [
            { "clave": "Tienda Norte", "Año": "2023", "Mes": "10 Oct", "Año - Mes": "2023-10 Oct", "Es": "Venta", "Tipo": "Retail", "Cliente_es": "Público", "Venta USD": 0, "Venta": 150000, "Gasto": 0, "P&L Venta": 5000 },
            { "clave": "Tienda Norte", "Año": "2023", "Mes": "10 Oct", "Año - Mes": "2023-10 Oct", "Es": "Gasto", "Tipo": "Gasto", "Cliente_es": "Gasto", "Venta USD": 0, "Venta": 0, "Gasto": 85000, "P&L Venta": 0 }
        ];

        // Instantiate DrillDowner normally
        new DrillDowner('#pnl-table', sqlData, {
            
            // 1. Default hierarchy
            groupOrder: ["clave", "Año - Mes", "Es", "Tipo"],
            availableDimensions: ["clave", "Año - Mes", "Es", "Tipo"],

            // 2. Dropdown grouping combinations
            groupOrderCombinations: [
                ["clave", "Año - Mes", "Es", "Tipo"],
                ["Año - Mes", "clave", "Es", "Tipo"]
            ],
            
            // 3. Declare numerical columns (Notice we add "Neto" here even though it's not in the SQL)
            totals: ["Venta USD", "Venta", "Gasto", "Neto", "P&L Venta"],
            
            // 4. Declare standard text columns
            columns: ["Cliente_es"],
            
            // 5. Native Ledger Mode configurations
            ledger: [
                { 
                    label: "Modo Ledger (Detalle Completo)", 
                    cols: ["clave", "Año - Mes", "Es", "Tipo", "Cliente_es", "Venta", "Gasto", "Neto"], 
                    sort: ["-Año - Mes", "clave"] 
                }
            ],
            
            controlsSelector: '#pnl-controls',
            
            // 6. Column properties & The Magic Math
            colProperties: {
                "clave": { label: "Tienda", icon: "🏬" },
                "Año - Mes": { label: "Periodo", icon: "📅" },
                "Es": { label: "Movimiento", icon: "🔄" },
                "Cliente_es": { label: "Cliente" },
                "Venta": { label: "Ventas", formatter: (v) => v ? `$${DrillDowner.formatNumber(v, 2)}` : '-' },
                "Gasto": { label: "Gastos", formatter: (v) => v ? `$${DrillDowner.formatNumber(v, 2)}` : '-' },
                
                // Native DrillDowner feature: Calculates Net from the separate rows automatically!
                "Neto": {
                    label: "Neto (Venta - Gasto)",
                    balanceBehavior: { initialBalance: 0, add: ["Venta"], subtract: ["Gasto"] },
                    formatter: (v) => `$${DrillDowner.formatNumber(v, 2)}`
                }
            }
        });
    </script>
</body>
</html>
