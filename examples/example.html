<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrillDowner.js - Interactive Hierarchical Tables</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #334155;
        }
        .header {
            background: white;
            padding: 0.3em 1em;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        .header h1 {
            margin: 0 0 4px 0;
            padding:0;
            color: #0f172a;
        }
        .header p {
            margin: 0;
            padding: 0;
            color: #64748b;
            font-size: 1.1rem;
        }
        .demo-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 20px;
        }
        .widget-layout {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .sidebar {
            width: 40px;
            flex-shrink: 0;
        }
        .main-table {
            flex-grow: 1;
            overflow-x: auto;
        }
        /* Status Badges */
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .status-shipped { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef08a; color: #854d0e; }
    </style>
    <link href="../src/drilldowner.css" rel="stylesheet" type="text/css"/>
    <script src="../src/DrillDowner.js"></script>
</head>
<body style="margin:0 auto;padding:0 1em">
<div style="margin:0;padding:0;display:flex;justify-content: space-between;align-items: start;flex-wrap: wrap">
    <a href="https://ocallit.github.io/DrillDowner/" aria-label="Home">🏠</a>
    <div style="margin:0;padding:0">
        <h1 style="margin:0;padding:0">DrillDowner.js</h1>
        <p style="font-size:0.9em;color:gray;margin:0;padding:0.2em">Interactive drill-down widget</p>
    </div>
    <a href="https://github.com/ocallit/DrillDowner" aria-label="GitHub Repository">
        <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
    </a>
</div>

<div class="header">
    <h1>DrillDowner.js</h1>
    <p>A dependency-free ES6 widget for interactive, hierarchical drill-down tables and ledgers.</p>
    <div style="margin-top: 15px;">
        <a href="https://github.com/ocallit/DrillDowner" style="color: var(--primary); text-decoration: none; font-weight: bold;">View on GitHub</a>
    </div>
</div>

<div class="demo-wrapper">
    <div id="dd-controls"></div>

    <div class="widget-layout">
        <div class="sidebar" id="dd-azbar"></div>

        <div class="main-table" id="dd-container"></div>
    </div>
</div>


<script>
    // 1. Rich dummy dataset
    const salesData = [
        { region: "North America", country: "USA", category: "Hardware", product: "Server Rack", rep: "Alice W.", units: 5, revenue: 12500, status: "Shipped" },
        { region: "North America", country: "USA", category: "Hardware", product: "Server Rack", rep: "Alice W.", units: 2, revenue: 5000, status: "Pending" },
        { region: "North America", country: "USA", category: "Software", product: "Cloud OS", rep: "Bob M.", units: 50, revenue: 15000, status: "Shipped" },
        { region: "North America", country: "Canada", category: "Hardware", product: "Router", rep: "Charlie D.", units: 15, revenue: 3000, status: "Shipped" },
        { region: "Europe", country: "UK", category: "Software", product: "Security Suite", rep: "Diana P.", units: 100, revenue: 25000, status: "Shipped" },
        { region: "Europe", country: "UK", category: "Software", product: "Cloud OS", rep: "Diana P.", units: 20, revenue: 6000, status: "Pending" },
        { region: "Europe", country: "Germany", category: "Hardware", product: "Server Rack", rep: "Eve S.", units: 8, revenue: 20000, status: "Shipped" },
        { region: "Asia", country: "Japan", category: "Software", product: "Security Suite", rep: "Kenji T.", units: 45, revenue: 11250, status: "Shipped" },
        { region: "Asia", country: "Japan", category: "Hardware", product: "Router", rep: "Kenji T.", units: 30, revenue: 6000, status: "Shipped" }
    ];

    // 2. Formatters
    const formatCurrency = (val) => {
        const num = Number(val);
        if (!isFinite(num)) return "";
        return num.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
    };

    const formatStatus = (val) => {
        if (!val) return "";
        const cls = val.toLowerCase() === 'shipped' ? 'status-shipped' : 'status-pending';
        return `<span class="status-badge ${cls}">${val}</span>`;
    };

    // 3. Initialize DrillDowner
    document.addEventListener('DOMContentLoaded', () => {
        new DrillDowner('#dd-container', salesData, {
            // Initial hierarchical grouping
            groupOrder: ["region", "country", "category", "product"],
            availableDimensions: ["region", "country", "category", "product", "rep"],

            // Allow users to switch between these specific grouping views
            groupOrderCombinations: [
                ["region", "country", "category", "product"],
                ["category", "product", "region", "country"],
                ["rep", "region", "product"]
            ],

            // Flat views (Ledger mode)
            ledger: [
                {
                    label: "Flat Sales Register (Detailed)",
                    cols: ["region", "country", "category", "product", "rep", "status"],
                    calSort: ["-revenue"],
                    viewSort: ["-revenue"],
                }
            ],

            // Columns to sum/aggregate
            totals: ["units", "revenue"],

            // Extra data columns to display
            columns: ["rep", "status"],

            // Hook up the DOM elements
            controlsSelector: '#dd-controls',
            azBarSelector: '#dd-azbar',

            // Column definitions & formatting
            colProperties: {
                region:   { label: "Region", icon: "🌍" },
                country:  { label: "Country", icon: "📍" },
                category: { label: "Category", icon: "📁" },
                product:  { label: "Product", icon: "📦" },

                units:    { label: "Units Sold", decimals: 0, class: "drillDowner_right" },
                revenue:  { label: "Total Revenue", formatter: formatCurrency, class: "drillDowner_right" },

                rep:      { label: "Sales Rep", togglesUp: true }, // Bubbles up unique reps to parent rows
                status:   { label: "Status", formatter: formatStatus }
            },

            // Make leaf rows more informative than a plain product string
            leafRenderer: (item) => {
                return `${item.product} <small style="color:#64748b">(${item.rep})</small>`;
            },

            showGrandTotals: true
        });
    });
</script>
</body>
</html>
