<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrillDowner Example</title>
    <link href="../src/drilldowner.css" rel="stylesheet" type="text/css"/>
    <script src="../src/DrillDowner.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }
        .main-content {
            flex: 1;
        }
        .sidebar {
            width: 50px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #555;
            margin-top: 30px;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code {
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
        }
        .note {
            background-color: #fffde7;
            padding: 10px;
            border-left: 4px solid #ffd600;
            margin: 20px 0;
        }
    </style>
</head>
<body style="margin:0 auto;padding:0 1em">
<div style="margin:0;padding:0;display:flex;justify-content: space-between;align-items: start;flex-wrap: wrap">
    <a href="https://ocallit.github.io/DrillDowner/" aria-label="Home">🏠</a>
    <div style="margin:0;padding:0">
        <h1 style="margin:0;padding:0">DrillDowner.js</h1>
        <p style="font-size:0.9em;color:gray;margin:0;padding:0.2em">Interactive drill-down widget</p>
    </div>
    <a href="https://github.com/ocallit/DrillDowner" aria-label="GitHub Repository">
        <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
    </a>
</div>
    <h1>DrillDowner - Example</h1>

    <div class="controls" id="table-controls"></div>
    <div class="container">
        <div class="sidebar" id="az-bar"></div>
        <div class="main-content" id="table-container"></div>
    </div>

    <script>
        const sampleData = [
            { category: "Electronics", product: "Smartphone", item:"i15", brand: "Apple", quantity: 15, price: 999.99, info:"info esa" },
            { category: "Electronics", product: "Smartphone", item:"i14", brand: "Apple", quantity: 25, price: 899.99, info:"info esa" },
            { category: "Electronics", product: "Smartphone", item:"A25", brand: "Samsung", quantity: 20, price: 899.99, info:"info ess" },
            { category: "Electronics", product: "Laptop", item:"inspiron", brand: "Dell", quantity: 8, price: 1299.99, info:"info eld" },
            { category: "Electronics", product: "Laptop", item:"hp43",  brand: "HP", quantity: 12, price: 1199.99, info:"info eshp" },
            { category: "Electronics", product: "Tablet", item:"iPad2",  brand: "Apple", quantity: 10, price: 599.99, info:"info ETA" },
            { category: "Electronics", product: "Tablet", item:"iPadS",  brand: "Samsung", quantity: 15, price: 499.99 },
            { category: "Books", product: "Fiction", item:"Fict1",  brand: "Penguin", quantity: 30, price: 15.99 },
            { category: "Books", product: "Fiction", item:"Fict2",  brand: "HarperCollins", quantity: 25, price: 14.99 },
            { category: "Books", product: "Non-Fiction", item:"Bio1",  brand: "Penguin", quantity: 20, price: 19.99 },
            { category: "Books", product: "Non-Fiction", item:"Bio2",  brand: "HarperCollins", quantity: 15, price: 18.99 },
            { category: "Clothing", product: "Shirts", item:"Rayada",  brand: "Nike", quantity: 40, price: 29.99 },
            { category: "Clothing", product: "Shirts", item:"Liza",  brand: "Adidas", quantity: 35, price: 27.99 },
            { category: "Clothing", product: "Pants", item:"Corto",  brand: "Nike", quantity: 30, price: 39.99 },
            { category: "Clothing", product: "Pants", item:"Largo",  brand: "Nike", quantity: 31, price: 49.99 },
            { category: "Clothing", product: "Pants", item:"Largo",  brand: "Adidas", quantity: 25, price: 37.99 }
        ];

        // Column properties
        const colProperties = {
            category: { 
                label: "Category",
                icon: "📁"
            },
            product: { 
                label: "Product Type",
                icon: "📦"
            },
            brand: { 
                label: "Brand",
                icon: "🏷️"
            },
            info: {
                label: "Info",
                icon: "?"
            },
            quantity: { 
                label: "Quantity",
                decimals: 0,
                class: "text-right"
            },
            price: { 
                label: "Price ($)",
                decimals: 2,

                class: "text-right",
                formatter: function(value) {
                    return "$" + value;
                }
            }
        };

        // Initialize DrillDowner
        document.addEventListener('DOMContentLoaded', function() {
            const drillDowner = new DrillDowner('#table-container', sampleData, {
                groupOrder: ["category", "brand","product","item",],
                availableDimensions: ["category", "brand", "product", "item"],
                columns: ["info"],
                totals: ["price","quantity"],
                colProperties: colProperties,
                onLabelClick: function(event) {
                    console.log("Label clicked:", arguments);
                },
             //   groupOrderCombinations:[["brand","product"],["category","product"],["category","brand","product"]],
                controlsSelector: '#table-controls',
                azBarSelector: '#az-bar',
                leafRenderer: function(item) {
                    return `${item.item} <small style="color:#666">(${item.brand})</small>`;
                }
            });
            console.log("drillDowner", drillDowner);
        });
    </script>
</body>
</html>
