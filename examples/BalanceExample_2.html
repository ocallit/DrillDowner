<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DrillDowner - Descending Date Ledger</title>
  <link href="../src/drilldowner.css" rel="stylesheet" type="text/css"/>
  <script src="../src/DrillDowner.js"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #f4f7f6; }
    .container { display: flex; gap: 20px; background: white; padding: 20px; }
    .controls { margin-bottom: 20px; padding: 15px; background: white; border-left: 5px solid #2196F3; }
    .col-in { color: green; }
    .col-out { color: red; }
    .col-bal { font-weight: bold; color: blue; }
    .note { font-size: 0.9em; color: #666; margin-top: 5px; }
  </style>
</head>
<body style="margin:0 auto;padding:0 1em">
<div style="margin:0;padding:0;display:flex;justify-content: space-between;align-items: start;flex-wrap: wrap">
  <a href="https://ocallit.github.io/DrillDowner/" aria-label="Home">🏠</a>
  <div style="margin:0;padding:0">
    <h1 style="margin:0;padding:0">DrillDowner.js</h1>
    <p style="font-size:0.9em;color:gray;margin:0;padding:0.2em">Interactive drill-down widget</p>
  </div>
  <a href="https://github.com/ocallit/DrillDowner" aria-label="GitHub Repository">
    <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
  </a>
</div>
<h1>Ledger: Latest Date First</h1>
<div class="controls" id="table-controls"></div>
<div class="container">
  <div class="sidebar" id="az-bar"></div>
  <div id="table-container"></div>
</div>

<script>
  const data = [
    { id: 1,  date: "2023-11-01", type: "Dep", cat: "Job",    desc: "Salary",   in_val: 5000, out_val: 0 },
    { id: 4,  date: "2023-11-15", type: "Dep", cat: "Job",    desc: "Bonus",    in_val: 1000, out_val: 0 },
    { id: 11, date: "2023-11-02", type: "Dep", cat: "Job",    desc: "Charge",   in_val: 0,    out_val: 50 },
    { id: 3,  date: "2023-11-05", type: "Wth", cat: "Living", desc: "Food",     in_val: 0,    out_val: 300 },
    { id: 3,  date: "2023-11-05", type: "Wth", cat: "Living", desc: "Sublet",   in_val: 400,  out_val: 0 },
    { id: 5,  date: "2023-11-20", type: "Wth", cat: "Fun",    desc: "Movies",   in_val: 0,    out_val: 50 },
    { id: 2,  date: "2023-11-03", type: "Wth", cat: "Living", desc: "Rent",     in_val: 0,    out_val: 1200 },
    { id: 6,  date: "2023-11-21", type: "Wth", cat: "Fun",    desc: "Snacks",   in_val: null, out_val: 20 }
  ];

  document.addEventListener('DOMContentLoaded', function() {
    new DrillDowner('#table-container', data, {
      totals: ["in_val", "out_val", "balance"],
      groupOrder: ["cat", "type", "desc"],
      availableDimensions: ["cat", "type", "desc"],
      columns: ["date", "desc"],

      // LEDGER MODE CONFIGURATION
      ledger: [{
        label: "Statement (Latest First)",
        // Notice the minus sign (-) for Descending Sort
        calcSort: ["date", "id"],
        viewSort: ["-date", "-id"],
        cols: ["date", "desc", "cat", "type"]
      }],

      colProperties: {
        in_val:  { label: "In",  decimals: 2, class: "col-in" },
        out_val: { label: "Out", decimals: 2, class: "col-out" },
        date:    { label: "Date" },
        balance: {
          label: "Balance",
          decimals: 2,
          class: "col-bal",
          balanceBehavior: {
            add: ["in_val"],
            subtract: ["out_val"],
            initialBalance: 2000
          }
        }
      },
      controlsSelector: '#table-controls',
      leafRenderer: (item) => `${item.desc} <small style="color:#666">(${item.date})</small>`
    });
  });
</script>
</body>
</html>
